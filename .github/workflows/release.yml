name: Release

on:
  push:
    tags:
      - 'v*'

# softprops/action-gh-release needs contents: write to create the GitHub
# release; the default GITHUB_TOKEN is read-only otherwise.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm package
      - run: pnpm vsix

      # Publish to Open VSX for Cursor / Windsurf / VSCodium (needs OVSX_PAT secret).
      - name: Publish to Open VSX
        run: pnpm publish:ovsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      # The VS Code Marketplace is published manually: download this release's
      # .vsix and upload it at https://marketplace.visualstudio.com/manage
      - uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
